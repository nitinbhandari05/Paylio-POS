services:
  api:
    build: .
    env_file: .env
    ports:
      - "3001:3001"
    depends_on:
      - mongo
      - redis
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
volumes:
  mongo-data:
